[gcode_macro PID_HOTEND]
description: Start Hotend PID calibration
gcode:
  {% set TARGET_TEMP = params.HOTEND_TEMP|default(210)|float %}
  G90                             ; Use absolute coordinates
  {% if printer.toolhead.homed_axes != "xyz" %}
    G28                           ; Home if not already homed
  {% endif %}
  G1 Z10 F600                     ; Lift nozzle 10mm above bed
  M106 S255                       ; Turn on part cooling fan to 100%
  PID_CALIBRATE HEATER=extruder TARGET={TARGET_TEMP}
  M107                            ; Turn off fan after completion
  SAVE_CONFIG                     ; Save results and restart